<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar</title>
 
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/cadastro.css">
</head>
 
<body class="modo-escuro">
 
    <div class="container">
        <div class="login-box">
            <div class="logo-section">
                <img src="../../../public/icon.svg" alt="Logo" class="logo">
            </div>
           
            <div class="form-section">
                <h1 class="login-letra">Cadastro</h1>
               
                <div class="input-group">
                    <div class="image-name">
                        <div class="image-box">
                            <img src="../../../public/add_photo_alternate.svg" alt="Perfil">
                        </div>

                        <input type="email" class="input-cadastro" placeholder="Nome">
                    </div>
                    <input type="text" class="input-cadastro" placeholder="Digite seu email">
                    <input type="password" class="input-cadastro" placeholder="Senha">
                    <input type="password" class="input-cadastro" placeholder="Confirmar senha">
                </div>
 
                <div class="btn-container">
                    <button class="btn-entrar">Entrar</button>
                    <button class="btn-cadastrar">Cadastrar</button>
                </div>
               
            </div>
        </div>
    </div>
 
</body>
</html>
