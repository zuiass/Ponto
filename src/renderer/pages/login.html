<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/login.css">
</head>

<body class="modo-escuro">
<div class="container">

    <div class="login-box">
        <div class="logo-section">
            <img src="../../../public/icon.svg" alt="Logo" class="logo">
        </div>
        
        <div class="form-section">
            <h1 class="login-letra">Login</h1>
            
            <div class="input-group">
                <input type="email" class="input-login" placeholder="Digite seu email">
                <input type="password" class="input-login" placeholder="Digite sua senha">
            </div>
            
            <div class="links-container">
                <span class="recuperar-link">Esqueceu a senha?</span> <a href="#" class="recuperar-senha">Recuperar</a>
            </div>

            <div class="btn-container">
                <button class="btn-criar-conta">Criar conta</button>
                <button class="btn-entrar">Entrar</button>
            </div>
            
        </div>
    </div>

</div>
</body>
</html>
